[discord]
token = your_bot_token_here

[mongodb]
uri = mongodb+srv://<username>:<password>@<cluster-url>/?retryWrites=true&w=majority
database = antiscambot
guild_config_collection = guild_config
scam_rules_collection = scam_rules

[moderation]
scam_threshold = 5
rule_refresh_interval_seconds = 30

[ocr]
# Leave empty to auto-detect (checks PATH + common OS install locations)
# You can set an absolute path or environment variable reference (example: $TESSERACT_CMD)
tesseract_cmd =
# Optional override also supported through env var: TESSERACT_CMD
# Leave empty for ThreadPoolExecutor default
workers =

[integrations]
owner_report_webhook_url = webhook here
