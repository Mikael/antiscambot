[discord]
token = your_bot_token_here

[mongodb]
uri = mongodb+srv://<username>:<password>@<cluster-url>/?retryWrites=true&w=majority
database = antiscambot
guild_config_collection = guild_config
scam_rules_collection = scam_rules

[moderation]
scam_threshold = 5
rule_refresh_interval_seconds = 30

[ocr]
# Leave empty to auto-detect
tesseract_cmd =
# Leave empty for ThreadPoolExecutor default
workers =
